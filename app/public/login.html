<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fogo Branco</title>
  <link rel="stylesheet" href="style.css?v=10">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fogo Branco">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<body>
<div class="auth-container">
  <div class="auth-box">
    <div class="logo"><img src="icon-192.png" alt="Fogo Branco" class="login-logo"></div>
    <h1>Fogo Branco</h1>
    <p>Sistema de Combate a Incêndios Florestais</p>

    <div class="error-msg" id="error-msg"></div>

    <!-- TELA 1: Escolha de perfil -->
    <div id="tela-perfil">
      <button class="btn-perfil btn-combatente" onclick="entrarCombatente()">
        <span class="perfil-icon">⛑️</span>
        <span class="perfil-label">Combatente</span>
        <span class="perfil-sub">Registrar e Mapa</span>
      </button>
      <button class="btn-perfil btn-gestor" onclick="mostrarEquipes()">
        <span class="perfil-icon">📋</span>
        <span class="perfil-label">Gestor</span>
        <span class="perfil-sub">Acesso completo</span>
      </button>
    </div>

    <!-- TELA 2: Escolha da equipe (gestor) -->
    <div id="tela-equipes" style="display:none;">
      <p style="font-size:13px; color:#666; margin-bottom:16px;">Selecione sua equipe:</p>
      <div class="equipes-grid">
        <button class="btn-equipe" onclick="selecionarEquipe('Defesa Civil')">Defesa Civil</button>
        <button class="btn-equipe" onclick="selecionarEquipe('IEF')">IEF</button>
        <button class="btn-equipe" onclick="selecionarEquipe('Carcará')">Carcará</button>
        <button class="btn-equipe" onclick="selecionarEquipe('AMDA Gerdau')">AMDA Gerdau</button>
        <button class="btn-equipe" onclick="selecionarEquipe('AMDA IEF')">AMDA IEF</button>
        <button class="btn-equipe" onclick="selecionarEquipe('CBMMG')">CBMMG</button>
      </div>
      <button class="btn btn-secondary" style="margin-top:14px; width:100%; font-size:13px;" onclick="voltarPerfil()">← Voltar</button>
    </div>

    <!-- TELA 3: Senha da equipe -->
    <div id="tela-senha" style="display:none;">
      <p style="font-size:14px; color:#333; margin-bottom:6px; font-weight:600;" id="equipe-selecionada-label"></p>
      <p style="font-size:13px; color:#666; margin-bottom:16px;">Digite a senha de acesso:</p>
      <div class="form-group">
        <input type="password" id="senha-gestor" placeholder="Senha" autocomplete="current-password" onkeydown="if(event.key==='Enter') entrarGestor()">
      </div>
      <button class="btn btn-primary" onclick="entrarGestor()" style="margin-bottom:10px;">Entrar como Gestor</button>
      <button class="btn btn-secondary" style="width:100%; font-size:13px;" onclick="voltarEquipes()">← Voltar</button>
    </div>

  </div>
</div>

<script>
  if (localStorage.getItem("role")) {
    window.location.href = "/";
  }

  let equipeSelecionada = "";

  function mostrarEquipes() {
    document.getElementById("tela-perfil").style.display = "none";
    document.getElementById("tela-equipes").style.display = "block";
    document.getElementById("error-msg").style.display = "none";
  }

  function voltarPerfil() {
    document.getElementById("tela-equipes").style.display = "none";
    document.getElementById("tela-perfil").style.display = "block";
    document.getElementById("error-msg").style.display = "none";
  }

  function selecionarEquipe(equipe) {
    equipeSelecionada = equipe;
    document.getElementById("equipe-selecionada-label").textContent = "Equipe: " + equipe;
    document.getElementById("tela-equipes").style.display = "none";
    document.getElementById("tela-senha").style.display = "block";
    document.getElementById("senha-gestor").value = "";
    document.getElementById("error-msg").style.display = "none";
    setTimeout(() => document.getElementById("senha-gestor").focus(), 100);
  }

  function voltarEquipes() {
    document.getElementById("tela-senha").style.display = "none";
    document.getElementById("tela-equipes").style.display = "block";
    document.getElementById("error-msg").style.display = "none";
  }

  function gerarToken(payload) {
    const header = btoa(JSON.stringify({ alg: "HS256", typ: "JWT" }));
    const body = btoa(JSON.stringify({ ...payload, iat: Math.floor(Date.now() / 1000) }));
    return header + "." + body + ".local";
  }

  function entrarCombatente() {
    const token = gerarToken({ role: "combatente", team: "Combatente" });
    localStorage.setItem("token", token);
    localStorage.setItem("role", "combatente");
    localStorage.setItem("team", "Combatente");
    window.location.href = "/";
  }

  async function entrarGestor() {
    const senha = document.getElementById("senha-gestor").value;
    const errorEl = document.getElementById("error-msg");
    errorEl.style.display = "none";
    if (!senha) { errorEl.textContent = "Digite a senha."; errorEl.style.display = "block"; return; }
    if (senha !== "106106") { errorEl.textContent = "Senha incorreta."; errorEl.style.display = "block"; return; }

    const token = gerarToken({ role: "gestor", team: equipeSelecionada });
    localStorage.setItem("token", token);
    localStorage.setItem("role", "gestor");
    localStorage.setItem("team", equipeSelecionada);

    // Tenta sincronizar token com o servidor (opcional, sem bloquear)
    fetch("/auth/gestor", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ equipe: equipeSelecionada, senha })
    }).then(r => r.json()).then(data => {
      if (data.token) localStorage.setItem("token", data.token);
    }).catch(() => {});

    window.location.href = "/";
  }
</script>
</body>
</html>
